# term-paper project configuration
# Положите основной ТЗ в директорию inputs.tz_dir
# Если нужен командный ПМИ, положите командное ТЗ в ./input/tz-team
# Положите архивы кода или папки репозиториев в директорию inputs.code_dir
# В inputs.notes_file можно добавить дополнительные требования, скриншоты и замечания
project:
    name: "Компьютерная игра в жанре \"пошаговая стратегия/тактика\" «The Hero»"
    english_name: "The computer game in the \"turn-based strategy/tactics\" genre \"The Hero\""
    code: "05.05-03"
    summary: "Компьютерная игра The Hero представляет собой пошаговую стратегию/тактику с игровым циклом «карта -> событие/бой -> награда -> усиление армии/базы». Пользователь управляет героем и армией на единственной тайловой карте мира, перемещается по клеткам, собирает ресурсы, взаимодействует с объектами карты, вступает в упрощённые пошаговые бои без тактической сетки и развивает базу. Программа поддерживает найм юнитов, улучшение построек и ранее нанятых юнитов, ручное и автоматическое сохранение прогресса, базовые настройки и русско-английский интерфейс. Продукт предназначен для персональных компьютеров под управлением Windows и рассчитан на короткие автономные игровые сессии без подключения к внешним сервисам."
    type: "компьютерная игра"
student:
    name: "Карнаухов Г. А."
    group: "БПИ246"
supervisor:
    name: "Поздняков Д. А."
    position: "Преподаватель департамента программной инженерии ФКН НИУ ВШЭ"
approver:
    name: "Павлочев Н. А."
    position: "Академический руководитель образовательной программы \"Программная инженерия\", старший преподаватель департамента программной инженерии"
organization:
    name: |-
        ПРАВИТЕЛЬСТВО РОССИЙСКОЙ ФЕДЕРАЦИИ
        ФЕДЕРАЛЬНОЕ ГОСУДАРСТВЕННОЕ АВТОНОМНОЕ
        ОБРАЗОВАТЕЛЬНОЕ УЧРЕЖДЕНИЕ ВЫСШЕГО ОБРАЗОВАНИЯ
        НАЦИОНАЛЬНЫЙ ИССЛЕДОВАТЕЛЬСКИЙ УНИВЕРСИТЕТ
        «ВЫСШАЯ ШКОЛА ЭКОНОМИКИ»
inputs:
